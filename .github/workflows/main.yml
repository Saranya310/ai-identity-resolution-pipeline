# Automated CI Validation Pipeline
name: Pipeline Health Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Core Integrity Engine
      run: python pipeline.py

    - name: Run Statistical Precision & Recall Evaluation
      run: python evaluate_pipeline.py

    - name: Execute Automated Regression Validation Suite
      run: python validate_engine.py
